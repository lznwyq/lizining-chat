<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>暂不可用</title>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  background: #f0e6f6;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.card {
  text-align: center;

<div class="card">
  <div class="icon">🐱</div>
  <h1>暂时关闭啦</h1>
