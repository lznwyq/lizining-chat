const chatArea = document.getElementById('chatArea');

let messages = [];
let hasGreeted = false;

// ============================================================
// INIT
// ============================================================
function init() {
  // Load chat history
  try {
    const saved = localStorage.getItem('lizining_chat_history');
    if (saved) {
      messages = JSON.parse(saved);
      welcomeMsg.style.display = 'none';
      messages.forEach(m => renderMessage(m.role, m.content, false));
      hasGreeted = true;
      scrollToBottom();
    }
  } catch(e) {
    messages = [];
  }

  // If no messages, show greeting
  if (messages.length === 0) {
    setTimeout(sendGreeting, 500);
  }
}

function sendGreeting() {
  const greetings = [
    'hi~ 我是李紫凝😶\n\n北邮大一的，社恐，但对熟人话还挺多的\n\n你是谁呀',
    '嗯？你来了呀😶\n\n我是李紫凝，有啥事吗',
    '你好呀👋\n\n我是李紫凝，北邮大一在读\n\n你是？😶'
  ];
  const greeting = greetings[Math.floor(Math.random() * greetings.length)];
  renderMessage('assistant', greeting, true);
  messages.push({ role: 'assistant', content: greeting });
  saveHistory();
  hasGreeted = true;
}

// ============================================================
// RENDER
// ============================================================
function renderMessage(role, content, animate) {
  if (role === 'assistant') {
    welcomeMsg.style.display = 'none';
  }

  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatarEmoji = role === 'user' ? '😶' : '🐱';
  div.innerHTML = '<div class="avatar-icon">' + avatarEmoji + '</div><div class="bubble">' + escapeHtml(content).replace(/\n/g, '<br>') + '</div>';

  if (animate) {
    div.style.opacity = '0';
    div.style.transform = 'translateY(8px)';
    chatArea.insertBefore(div, typing);
    requestAnimationFrame(() => {
      div.style.transition = 'all 0.3s ease';
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
    });
  } else {
    chatArea.insertBefore(div, typing);
  }

  scrollToBottom();
}

function showTyping() {
  typing.classList.add('show');
  scrollToBottom();
}

function hideTyping() {
  typing.classList.remove('show');
}

function showStatus(msg) {
  statusBar.textContent = msg;
  statusBar.classList.add('show');
  setTimeout(() => { if (statusBar.textContent === msg) statusBar.classList.remove('show'); }, 5000);
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
// CHAT CLEAR
// ============================================================
function clearHistory() {
  if (confirm('确定清除所有聊天记录？')) {
    messages = [];
    localStorage.removeItem('lizining_chat_history');
    chatArea.querySelectorAll('.msg').forEach(m => m.remove());
    welcomeMsg.style.display = '';
    hasGreeted = false;
    setTimeout(sendGreeting, 300);
  }
}

// ============================================================
// API CALL — 通过 Cloudflare Worker 中转
// ============================================================
async function callDeepSeek(userMessage) {
  const apiMessages = [{ role: 'system', content: SYSTEM_PROMPT }];
  const recentMessages = messages.slice(-20);
  recentMessages.forEach(m => {
    apiMessages.push({ role: m.role, content: m.content });
  });

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: apiMessages })
    });

    if (!response.ok) {
      if (response.status === 401) {
        throw new Error('服务配置错误，请联系李紫凝');
      } else if (response.status === 402) {
        throw new Error('余额不足，请联系李紫凝充值');
      } else {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || '请求失败: ' + response.status);
      }
    }

    const data = await response.json();
    return data.choices[0].message.content;
  } catch(e) {
    if (e.name === 'TypeError' && e.message.includes('Failed to fetch')) {
      throw new Error('网络连接失败，请检查网络或稍后重试');
    }
    throw e;
  }
}

// ============================================================
// SEND MESSAGE
// ============================================================
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  // Disable input
  userInput.disabled = true;
  sendBtn.disabled = true;
  userInput.value = '';

  // Render user message
  renderMessage('user', text, true);
  messages.push({ role: 'user', content: text });
  saveHistory();

  // Show typing
  showTyping();

  // Call API
  let reply;
  try {
    reply = await callDeepSeek(text);
  } catch(e) {
    hideTyping();
    showStatus('错误: ' + e.message);
    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();
    return;
  }

  hideTyping();

  if (reply) {
    renderMessage('assistant', reply, true);
    messages.push({ role: 'assistant', content: reply });
    saveHistory();
  } else {
    showStatus('未收到回复，请重试');
  }

  // Re-enable input
  userInput.disabled = false;
  sendBtn.disabled = false;
  userInput.focus();
}

function saveHistory() {
  if (messages.length > 50) {
    messages = messages.slice(-50);
  }
  try {
    localStorage.setItem('lizining_chat_history', JSON.stringify(messages));
  } catch(e) {
    messages = messages.slice(-30);
    localStorage.setItem('lizining_chat_history', JSON.stringify(messages));
  }
}

// ============================================================
// START
// ============================================================
init();
</script>
